name: Supply Chain Governance

on:
  push:
    branches: [master, main]
    paths:
      - 'schemas/exceptions.json'
      - 'schemas/exceptions.schema.json'
      - 'audit.toml'
      - 'SUPPLY_CHAIN_EXCEPTIONS.md'
      - 'scripts/validate_governance.py'
      - '.github/workflows/supply-chain-governance.yml'
  pull_request:
    branches: [master, main]
    paths:
      - 'schemas/exceptions.json'
      - 'schemas/exceptions.schema.json'
      - 'audit.toml'
      - 'SUPPLY_CHAIN_EXCEPTIONS.md'
      - 'scripts/validate_governance.py'
      - '.github/workflows/supply-chain-governance.yml'

jobs:
  registry-validation:
    name: Registry Schema Validation
    runs-on: ubuntu-latest
    outputs:
      conformance: ${{ steps.validate.outputs.conformance }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install jsonschema
        run: pip install jsonschema

      - name: Validate governance registry
        id: validate
        run: |
          python3 scripts/validate_governance.py \
            --schema schemas/exceptions.schema.json \
            --data schemas/exceptions.json \
            --audit audit.toml \
            --out supply-chain-evidence/evidence_manifest.json
          CONFORMANCE=$(python3 -c "import json; print(json.load(open('supply-chain-evidence/evidence_manifest.json'))['conformance'])")
          echo "conformance=$CONFORMANCE" >> $GITHUB_OUTPUT

      - name: Upload evidence manifest
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: supply-chain-evidence-manifest
          path: supply-chain-evidence/evidence_manifest.json

  dependency-security:
    name: Dependency Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: swatinem/rust-cache@v2

      - name: Run cargo audit
        continue-on-error: true
        run: |
          cargo install cargo-audit 2>/dev/null || true
          cargo audit 2>&1 | tee supply-chain-evidence/cargo-audit.txt
          cargo audit --json 2>/dev/null > supply-chain-evidence/cargo-audit.json || true

      - name: Run cargo deny
        continue-on-error: true
        run: |
          cargo install cargo-deny 2>/dev/null || true
          cargo deny check 2>&1 | tee supply-chain-evidence/cargo-deny-report.txt || true

      - name: Upload security scans
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-security-scans
          path: supply-chain-evidence/

  exception-policy:
    name: Exception Policy Enforcement
    runs-on: ubuntu-latest
    needs: [registry-validation, dependency-security]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check exception policy
        run: |
          python3 << 'PYEOF'
          import json
          import sys
          from datetime import date

          with open('schemas/exceptions.json') as f:
              registry = json.load(f)

          exceptions = registry.get('exceptions', [])
          active = [e for e in exceptions if e['status'] == 'ACTIVE']

          today = date.today()
          violations = []

          for exc in active:
              next_review = exc.get('next_review', '')
              if not next_review:
                  violations.append(f"{exc['exception_id']}: ACTIVE without next_review date")
              elif next_review < today.isoformat():
                  violations.append(f"{exc['exception_id']}: past next_review date ({next_review})")

          if violations:
              print("Policy violations:")
              for v in violations:
                  print(f"  - {v}")
              sys.exit(1)

          print(f"Policy checks PASS: {len(active)} active exceptions")
          PYEOF

      - name: Upload policy report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: exception-policy-report
          path: schemas/exceptions.json

  evidence-generation:
    name: Evidence Bundle Generation
    runs-on: ubuntu-latest
    needs: [registry-validation, dependency-security, exception-policy]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: supply-chain-evidence/

      - name: Generate evidence bundle
        run: |
          python3 << 'PYEOF'
          import json
          import os
          from datetime import datetime, timezone
          import subprocess

          git_commit = subprocess.run(
              ["git", "rev-parse", "HEAD"], capture_output=True, text=True
          ).stdout.strip()

          checks = []
          schema_ok = os.path.exists("supply-chain-evidence/supply-chain-evidence-manifest/evidence_manifest.json")
          checks.append({"name": "registry-schema", "status": "PASS" if schema_ok else "FAIL", "artifact": "exceptions.json"})

          audit_ok = os.path.exists("supply-chain-evidence/dependency-security-scans/cargo-audit.txt")
          checks.append({"name": "cargo-audit", "status": "PASS" if audit_ok else "FAIL", "artifact": "cargo-audit.json"})

          deny_ok = os.path.exists("supply-chain-evidence/dependency-security-scans/cargo-deny-report.txt")
          checks.append({"name": "cargo-deny", "status": "PASS" if deny_ok else "FAIL", "artifact": "cargo-deny-report.txt"})

          all_pass = all(c["status"] == "PASS" for c in checks)
          bundle = {
              "schema_version": "1.0",
              "conformance": "PASS" if all_pass else "FAIL",
              "git_commit": git_commit,
              "generated_at": datetime.now(timezone.utc).isoformat(),
              "checks": checks
          }

          os.makedirs("supply-chain-evidence", exist_ok=True)
          with open("supply-chain-evidence/evidence_bundle.json", "w") as f:
              json.dump(bundle, f, indent=2)
              f.write("\n")

          print(json.dumps(bundle, indent=2))
          PYEOF

      - name: Upload evidence bundle
        uses: actions/upload-artifact@v4
        with:
          name: supply-chain-evidence-bundle
          path: supply-chain-evidence/evidence_bundle.json
