# cargo-audit configuration
# Ignore advisories that have been reviewed and accepted in the supply chain governance registry.
# See: schemas/exceptions.json for the full exception registry.
# See: SUPPLY_CHAIN_EXCEPTIONS.md for the governance document.
#
# EX-0002: crossbeam-epoch 0.9.18 (transitive via wasmtime) — 1 advisory
# EX-0003: wasmtime 29.0.1 (smoke test only, not core stack) — all advisories below
#
# Rationale: wasmtime is used only by tscp-wasm-smoke (runtime smoke test),
# not by the core serialization or proving stack. No untrusted WASM is executed.
# Upgrade path: wasmtime >=36.0.7 resolves all advisories (API migration required).

[advisories]
ignore = [
  # EX-0002: crossbeam-epoch 0.9.18 (transitive via wasmtime)
  "RUSTSEC-2026-0204",

  # EX-0003: wasmtime 29.0.1 — all advisories from RustSec database
  # 2026 advisories
